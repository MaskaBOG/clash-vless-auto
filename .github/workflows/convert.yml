name: Convert VLESS to Clash YAML

on:
  schedule:
    - cron: '0 * * * *'  # Каждый час
  workflow_dispatch:  # Ручной запуск
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests
      
      - name: Download VLESS configs
        run: |
          curl -o vless_lite.txt https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt
      
      - name: Convert to Clash YAML
        run: |
          python convert.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add clash_config.yaml
          
          # Проверяем есть ли изменения
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi
          
          # Коммитим
          git commit -m "🤖 Auto-update: $(date '+%Y-%m-%d %H:%M UTC')"
          
          # Пушим (БЕЗ pull - конфликтов не может быть!)
          git push || {
            echo "⚠️ Push failed, trying to pull first..."
            git pull --rebase --autostash
            git push
          }
          
          echo "✅ Successfully updated clash_config.yaml"
